services:
    frontend:
        build: .
        ports:
            - '127.0.0.1:8080:80'
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - server
        restart: unless-stopped
    caddy:
        image: caddy:2-alpine
        ports:
            - '80:80'
            - '443:443'
        env_file:
            - .env
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - frontend
        restart: unless-stopped

volumes:
    caddy_data:
    caddy_config:
