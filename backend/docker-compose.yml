services:
    server:
        build: .
        ports:
            - '3002:3002'
        command: node ./bin/server.js --no-colors
        env_file:
            - .env
            - .env.docker
        depends_on:
            init:
                condition: service_completed_successfully
        restart: unless-stopped
    worker:
        build: .
        command: node ./bin/worker.js --no-colors
        env_file:
            - .env
            - .env.docker
        depends_on:
            init:
                condition: service_completed_successfully
        restart: unless-stopped
    valkey:
        image: valkey/valkey:alpine
        ports:
            - '6379:6379'
        volumes:
            - valkey_data:/data
        healthcheck:
            test: ['CMD', 'valkey-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped
    postgres:
        image: postgres:16-alpine
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        environment:
            POSTGRES_USER: yhub
            POSTGRES_PASSWORD: yhub
            POSTGRES_DB: yhub
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U yhub']
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped
    minio:
        image: minio/minio:latest
        ports:
            - '9000:9000'
            - '9001:9001'
        volumes:
            - minio_data:/data
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 5s
        restart: unless-stopped
    init:
        build: .
        command: sh -c "sleep 5 && node ./bin/init-db.js && echo done"
        env_file:
            - .env
            - .env.docker
        depends_on:
            postgres:
                condition: service_healthy
            valkey:
                condition: service_healthy
            minio:
                condition: service_healthy
        restart: "no"

volumes:
    postgres_data:
    minio_data:
    valkey_data:
