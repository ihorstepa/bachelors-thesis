name: monorepo

include:
    - ./backend/docker-compose.yml
    - ./frontend/docker-compose.yml

services:
    caddy:
        image: caddy:2-alpine
        ports:
            - '80:80'
            - '443:443'
        environment:
            DOMAIN: ${DOMAIN:-localhost}
            ACME_EMAIL: ${ACME_EMAIL:-}
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - frontend

volumes:
    caddy_data:
    caddy_config:
